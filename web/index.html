<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAN Tracker | Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="main-header">
        <div class="logo">
          <span class="gold-text">LAN</span>TRACKER
        </div>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Agregar jugador (Nombre#Tag)..." />
          <button id="add-player-btn">Agregar</button>
        </div>
      </header>

      <main class="content">
        <section class="ladder-section">
          <div class="section-header">
            <h1>ladderboard</h1>
            <div class="header-line"></div>
          </div>
          
          <div id="ladder-container" class="ladder-list">
            <!-- Los jugadores se cargarán aquí dinámicamente -->
            <div class="loading">Cargando la grieta...</div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
