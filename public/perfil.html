<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario | LAN Tracker</title>
    <link rel="stylesheet" href="/styles.css?v=3.0.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>
    <a href="/" class="back-btn">← Volver al Tracker</a>

    <div class="profile-container" id="profile-content">
        <div class="loading">Invocando el perfil...</div>
    </div>

    <script>
        async function loadProfile() {
            const pathParts = window.location.pathname.split('/');
            const discordId = pathParts[pathParts.length - 1];
            const content = document.getElementById('profile-content');

            try {
                // Cargar items dinámicamente
                const itemsRes = await fetch('/api/items');
                const GACHA_ITEMS = await itemsRes.json();

                const response = await fetch(`/api/profile/${discordId}`);
                if (!response.ok) throw new Error('Perfil no encontrado');
                const data = await response.json();

                // Obtener versión de DDragon
                const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
                const versions = await vRes.json();
                const version = versions[0];

                const inventory = data.inventory || [];
                
                // DEFINIR ORDEN DE RAREZA
                const rarityOrder = { 'Legendario': 1, 'Épico': 2, 'Raro': 3, 'Común': 4 };

                // AGRUPAR ITEMS DUPLICADOS
                const groupedMap = {};
                inventory.forEach(item => {
                    const id = item.id;
                    if (!groupedMap[id]) {
                        groupedMap[id] = { ...item, count: 1 };
                    } else {
                        groupedMap[id].count++;
                    }
                });

                // CONVERTIR A ARRAY Y ORDENAR POR RAREZA
                const sortedItems = Object.values(groupedMap).sort((a, b) => {
                    return (rarityOrder[a.rarity] || 5) - (rarityOrder[b.rarity] || 5);
                });

                const inventoryHtml = sortedItems.length > 0 
                    ? sortedItems.map(itemObj => {
                        const item = GACHA_ITEMS.find(i => i.id === itemObj.id) || itemObj;
                        
                        let imgUrl = 'https://ddragon.leagueoflegends.com/cdn/' + version + '/img/profileicon/29.png';
                        
                        if (item.type === 'coins') {
                            imgUrl = 'https://cdn-icons-png.flaticon.com/512/2489/2489756.png';
                        } else if (item.img) {
                            if (item.type === 'pro') {
                                // Usar el proxy para las fotos de pros
                                const cleanUrl = item.img.replace(/^https?:\/\//, '');
                                imgUrl = `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}&w=300&h=450&fit=cover`;
                            } else {
                                imgUrl = `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${item.img}.jpg`;
                            }
                        } else {
                            imgUrl = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${item.id}.png`;
                        }
                        
                        const countBadge = itemObj.count > 1 ? `<div class="item-count">x${itemObj.count}</div>` : '';
                        const isMain = data.linkedAcc && data.linkedAcc.mainItem && data.linkedAcc.mainItem.id === item.id;
                        
                        return `
                            <div class="item-card card-${item.rarity} selectable ${isMain ? 'is-main' : ''}" 
                                 onclick="selectMainItem('${data.linkedAcc ? data.linkedAcc.puuid : ''}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                                ${countBadge}
                                <div class="item-img-container">
                                    <img src="${imgUrl}" alt="${item.name}" class="item-img" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/${version}/img/profileicon/29.png'">
                                </div>
                                <span class="item-name">${item.name}</span>
                                <span class="item-rarity rarity-${item.rarity}">${item.rarity}</span>
                            </div>
                        `;
                    }).join('')
                    : '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #a09b8c;">La mochila está vacía... por ahora.</p>';

                const displayName = data.linkedAcc 
                    ? `${data.linkedAcc.gameName}#${data.linkedAcc.tagLine}`
                    : (data.discordTag || 'Usuario Desconocido');

                const displayAvatar = data.linkedAcc
                    ? `https://ddragon.leagueoflegends.com/cdn/${version}/img/profileicon/${data.linkedAcc.profileIconId}.png`
                    : null;

                content.innerHTML = `
                    <div class="profile-header">
                        <div class="user-avatar">
                            ${displayAvatar ? `<img src="${displayAvatar}" style="width:100%; height:100%; border-radius:50%;">` : (data.discordTag ? data.discordTag.charAt(0) : '?')}
                        </div>
                        <div class="user-info">
                            <h1>${displayName}</h1>
                            <div class="user-stats">
                                <div class="stat-item">
                                    <span class="stat-value">${data.coins.toLocaleString()}</span>
                                    <span class="stat-label">Naafiri Coins</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value">${inventory.length}</span>
                                    <span class="stat-label">Campeones</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="inventory-section">
                        <div class="section-title">
                            <i>🎒</i> Mi Mochila de Campeones
                        </div>
                        <div class="items-grid">
                            ${inventoryHtml}
                        </div>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `
                    <div class="error-msg">
                        <h1>⚠️ Perfil no encontrado</h1>
                        <p>No pudimos encontrar datos para este usuario. Asegúrate de estar vinculado en el servidor de Discord.</p>
                        <a href="/" style="color: var(--premium-gold); text-decoration: none;">Volver al inicio</a>
                    </div>
                `;
            }
        }

        async function selectMainItem(puuid, item) {
            if (!puuid) {
                alert('Debes vincular tu cuenta de LoL en Discord para elegir un item principal.');
                return;
            }

            try {
                // Si el item ya era el principal, lo desmarcamos (enviando null)
                // Pero por ahora, simplemente lo seleccionamos.
                
                const res = await fetch(`/accounts/${puuid}/main-item`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item: item })
                });

                if (res.ok) {
                    // Recargar perfil para mostrar cambios
                    loadProfile();
                } else {
                    console.error('Error al guardar item principal');
                }
            } catch (e) {
                console.error(e);
            }
        }

        loadProfile();
    </script>
</body>
</html>
