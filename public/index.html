<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAN Tracker - Las Perras de Naafiri</title>
  <meta name="description" content="Tracker de League of Legends para la comunidad Las Perras de Naafiri." />
  <link rel="icon" type="image/png" href="pic/estetica/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3.0.2" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- Fondo atmosférico -->
  <div class="bg-overlay"></div>

  <!-- NAVBAR -->
  <nav class="topnav" id="topnav">
    <div class="topnav-inner">
      <div class="topnav-brand">
        <img src="pic/estetica/logo.png" class="topnav-logo" alt="Logo">
        <div class="topnav-title-wrap">
          <img src="pic/estetica/texto.png" class="topnav-title-img" alt="Título">
        </div>
      </div>
      <div class="topnav-actions">
        <button onclick="window.location.href='hall-of-fame.html'">👑 HOF</button>
        <button class="add-account-btn" onclick="openAddAccountModal()">Agregar Cuenta</button>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="tracker-wrap">

    <!-- Cuentas -->
    <section class="accounts-section">
      <div class="section-header-flex">
        <h2 class="section-title">🏆 Leaderboard</h2>
        <div class="search-filter-wrap">
          <input type="text" id="filter-input" placeholder="Buscar jugador..." autocomplete="off" />
        </div>
      </div>
      <div id="error-msg" class="error-msg" style="display:none;"></div>
      <div class="accounts-grid" id="accounts-grid">
        <!-- Generado por render.js -->
      </div>
    </section>

  </main>

  <!-- Input oculto para compatibilidad con handleSearch -->
  <input type="text" id="search-input" style="display:none;" autocomplete="off" />

  <!-- Sidebar de Actividad -->
  <aside class="activity-sidebar collapsed" id="activity-sidebar">
    <button class="activity-toggle" id="activity-toggle">«</button>
    <div class="activity-sidebar-header">
      <h3 style="font-family: var(--font-title); color: #fff; margin:0; font-size:1rem;">📡 Feed Actividad</h3>
      <button id="activity-pin" style="background: none; border: none; font-size: 1.1rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;" title="Fijar panel">📌</button>
    </div>
    <div id="activity-feed" style="overflow-y: auto; height: calc(100% - 70px);">
      <div class="empty-state-mini">Cargando actividad...</div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="render.js?v=3.0.2"></script>
  <script src="storage.js?v=3.0.2"></script>
  <script src="api.js?v=3.0.2"></script>
  <script src="app.js?v=3.0.2"></script>

  <!-- Diálogo Personalizado (Premium Alert/Confirm/Prompt) -->
  <div id="customDialog" class="modal-overlay" style="z-index: 10000;">
    <div class="custom-dialog-box">
      <h3 id="cd-title" class="cd-title"></h3>
      <p id="cd-message" class="cd-message"></p>
      <input type="text" id="cd-input" class="cd-input" style="display:none;" placeholder="Nombre#TAG" autocomplete="off" />
      <div class="cd-actions">
        <button id="cd-cancel" class="cd-btn-cancel" style="display:none;">Cancelar</button>
        <button id="cd-confirm" class="cd-btn-confirm">Aceptar</button>
      </div>
    </div>
  </div>

  <script>
    // Efecto scroll en navbar
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('topnav');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
    });


    async function openAddAccountModal() {
      const raw = await showCustomPrompt('Agregar Cuenta', 'Ingresa el nombre del invocador en formato Nombre#TAG');
      if (!raw) return;
      const input = document.getElementById('search-input');
      if (input) {
        input.value = raw.trim();
        if (typeof handleSearch === 'function') handleSearch();
      }
    }
  </script>
</body>
</html>
